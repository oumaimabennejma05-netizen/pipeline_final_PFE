name: GMAO - Deploy Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_recreate_vm:
        description: "Forcer la re-création de la VM (destroy + apply)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_post_install:
        description: "Passer le post-install (si déjà fait)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      destroy_infra:
        description: "Détruire l'infrastructure (terraform destroy)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  TF_DIR: ./terraform
  AWS_REGION: us-east-1

concurrency:
  group: gmao-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:

# ════════════════════════════════════════════════════════════════════════════
#  JOB 0 — Validation du code
# ════════════════════════════════════════════════════════════════════════════
  job0_validate_code:
    name: "JOB 0 — Validation du code"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.destroy_infra != 'true' }}

    outputs:
      backend_ok:  ${{ steps.validate_backend.outputs.backend_ok }}
      frontend_ok: ${{ steps.validate_frontend.outputs.frontend_ok }}

    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Validation backend (mvn compile)
        id: validate_backend
        run: |
          if [ -f "gmao-backend/pom.xml" ]; then
            echo "Compilation du backend Maven..."
            cd gmao-backend
            mvn compile -q --no-transfer-progress 2>&1
            echo "backend_ok=true" >> $GITHUB_OUTPUT
            echo "Backend compile avec succes"
          else
            echo "Pas de pom.xml trouve — validation backend ignoree"
            echo "backend_ok=skipped" >> $GITHUB_OUTPUT
          fi

      - name: Validation frontend (npm install)
        id: validate_frontend
        run: |
          if [ -f "gmao-frontend/package.json" ]; then
            echo "Verification du frontend..."
            cd gmao-frontend
            npm install --silent 2>&1
            echo "frontend_ok=true" >> $GITHUB_OUTPUT
            echo "Frontend valide avec succes"
          else
            echo "Pas de package.json trouve — validation frontend ignoree"
            echo "frontend_ok=skipped" >> $GITHUB_OUTPUT
          fi

      - name: Resume validation
        run: |
          echo "Backend  : ${{ steps.validate_backend.outputs.backend_ok }}"
          echo "Frontend : ${{ steps.validate_frontend.outputs.frontend_ok }}"

# ════════════════════════════════════════════════════════════════════════════
#  JOB 1 — Creation VM EC2
# ════════════════════════════════════════════════════════════════════════════
  job1_create_vm:
    name: "JOB 1 — Creation / Verification VM EC2"
    runs-on: ubuntu-latest
    needs: job0_validate_code
    if: ${{ github.event.inputs.destroy_infra != 'true' }}

    outputs:
      public_ip:   ${{ steps.resolve_ip.outputs.public_ip }}
      instance_id: ${{ steps.resolve_ip.outputs.instance_id }}
      vm_created:  ${{ steps.resolve_ip.outputs.vm_created }}
      vm_skipped:  ${{ steps.resolve_ip.outputs.vm_skipped }}

    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Configuration credentials AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Detection VM deja en cours d execution
        id: detect_running_vm
        run: |
          RUNNING=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=gmao-server" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].[InstanceId,PublicIpAddress]" \
            --output text 2>/dev/null || echo "")

          if [ -n "$RUNNING" ]; then
            INSTANCE_ID=$(echo "$RUNNING" | awk '{print $1}' | head -1)
            PUBLIC_IP=$(echo "$RUNNING"   | awk '{print $2}' | head -1)
            echo "VM deja active : $INSTANCE_ID ($PUBLIC_IP)"
            echo "vm_already_running=true"  >> $GITHUB_OUTPUT
            echo "existing_ip=$PUBLIC_IP"   >> $GITHUB_OUTPUT
            echo "existing_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          else
            echo "Aucune VM active — creation necessaire"
            echo "vm_already_running=false" >> $GITHUB_OUTPUT
          fi

      - name: VM deja active — skip creation
        if: steps.detect_running_vm.outputs.vm_already_running == 'true'
        run: |
          echo "VM existante reutilisee : ${{ steps.detect_running_vm.outputs.existing_id }}"
          echo "IP : ${{ steps.detect_running_vm.outputs.existing_ip }}"

      - name: Destroy VMs precedentes arretees
        if: steps.detect_running_vm.outputs.vm_already_running != 'true'
        working-directory: ${{ env.TF_DIR }}
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=gmao-server" \
                      "Name=instance-state-name,Values=stopped,pending,stopping" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text 2>/dev/null || echo "")

          if [ -n "$INSTANCE_IDS" ]; then
            COUNT=$(echo "$INSTANCE_IDS" | wc -w)
            echo "$COUNT VM(s) arretee(s) : $INSTANCE_IDS"
            aws ec2 terminate-instances --instance-ids $INSTANCE_IDS
            aws ec2 wait instance-terminated --instance-ids $INSTANCE_IDS
            echo "$COUNT VM(s) supprimee(s)"
            terraform state list 2>/dev/null | xargs -r terraform state rm 2>/dev/null || true
          else
            echo "Aucune VM arretee a nettoyer"
          fi

      - name: Terraform Validate
        if: steps.detect_running_vm.outputs.vm_already_running != 'true'
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        if: steps.detect_running_vm.outputs.vm_already_running != 'true'
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: steps.detect_running_vm.outputs.vm_already_running != 'true'
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Resolution IP finale
        id: resolve_ip
        working-directory: ${{ env.TF_DIR }}
        run: |
          if [ "${{ steps.detect_running_vm.outputs.vm_already_running }}" = "true" ]; then
            PUBLIC_IP="${{ steps.detect_running_vm.outputs.existing_ip }}"
            INSTANCE_ID="${{ steps.detect_running_vm.outputs.existing_id }}"
            echo "vm_created=false"  >> $GITHUB_OUTPUT
            echo "vm_skipped=true"   >> $GITHUB_OUTPUT
          else
            PUBLIC_IP=$(terraform output -raw public_ip)
            INSTANCE_ID=$(terraform output -raw instance_id)
            echo "vm_created=true"   >> $GITHUB_OUTPUT
            echo "vm_skipped=false"  >> $GITHUB_OUTPUT
          fi
          echo "public_ip=$PUBLIC_IP"     >> $GITHUB_OUTPUT
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "ID: $INSTANCE_ID | IP: $PUBLIC_IP"

      - name: Attente SSH disponible (2 min max)
        if: steps.detect_running_vm.outputs.vm_already_running != 'true'
        run: |
          VM_IP="${{ steps.resolve_ip.outputs.public_ip }}"
          echo "Attente du port 22 sur $VM_IP..."
          for i in $(seq 1 24); do
            if nc -zv "$VM_IP" 22 2>/dev/null; then
              echo "SSH disponible"
              exit 0
            fi
            echo "Tentative $i/24 — 5s..."
            sleep 5
          done
          echo "SSH non disponible apres 2 minutes"
          exit 1

# ════════════════════════════════════════════════════════════════════════════
#  JOB 2 — Post-installation
# ════════════════════════════════════════════════════════════════════════════
  job2_post_install:
    name: "JOB 2 — Post-Installation"
    runs-on: ubuntu-latest
    needs: job1_create_vm
    if: |
      github.event.inputs.destroy_infra != 'true' &&
      needs.job1_create_vm.outputs.vm_skipped != 'true'

    env:
      VM_IP: ${{ needs.job1_create_vm.outputs.public_ip }}

    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Configuration cle SSH (vockey)
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/vockey.pem
          chmod 600 ~/.ssh/vockey.pem
          ssh-keygen -l -f ~/.ssh/vockey.pem || {
            echo "Cle SSH invalide"
            exit 1
          }
          cat >> ~/.ssh/config << SSHCFG
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            IdentityFile ~/.ssh/vockey.pem
          SSHCFG

      - name: Verification installations existantes
        id: check_install
        run: |
          SKIP_INPUT="${{ github.event.inputs.skip_post_install || 'false' }}"
          if [ "$SKIP_INPUT" = "true" ]; then
            echo "Skip post-install demande manuellement"
            echo "already_installed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          INSTALLED=$(ssh -i ~/.ssh/vockey.pem \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 \
              ubuntu@${{ env.VM_IP }} \
              "command -v java && command -v mvn && command -v psql && command -v node && \
               test -d ~/gmao-backend && test -d ~/gmao-frontend && echo 'ALL_OK'" \
              2>/dev/null || echo "")

          if echo "$INSTALLED" | grep -q "ALL_OK"; then
            echo "Tous les outils et projets sont deja installes"
            echo "already_installed=true" >> $GITHUB_OUTPUT
          else
            echo "Installation necessaire"
            echo "already_installed=false" >> $GITHUB_OUTPUT
          fi

      - name: Copie du script post-install sur la VM
        if: steps.check_install.outputs.already_installed != 'true'
        run: |
          scp -i ~/.ssh/vockey.pem \
              -o StrictHostKeyChecking=no \
              scripts/02_post_install.sh \
              ubuntu@${{ env.VM_IP }}:~/02_post_install.sh

      - name: Execution du post-install
        if: steps.check_install.outputs.already_installed != 'true'
        timeout-minutes: 15
        run: |
          ssh -i ~/.ssh/vockey.pem \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ env.VM_IP }} \
              "chmod +x ~/02_post_install.sh && ~/02_post_install.sh"

      - name: Verification des installations
        run: |
          ssh -i ~/.ssh/vockey.pem \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ env.VM_IP }} \
              "java -version 2>&1 | head -1 && \
               mvn -version 2>&1 | head -1 && \
               psql --version && \
               node -v && npm -v && \
               ls ~/gmao-backend/ && echo 'gmao-backend OK' && \
               ls ~/gmao-frontend/ && echo 'gmao-frontend OK'"

# ════════════════════════════════════════════════════════════════════════════
#  JOB 3 — Demarrage Application
# ════════════════════════════════════════════════════════════════════════════
  job3_start_app:
    name: "JOB 3 — Demarrage Application GMAO"
    runs-on: ubuntu-latest
    needs: [job1_create_vm, job2_post_install]
    if: |
      github.event.inputs.destroy_infra != 'true' &&
      needs.job1_create_vm.outputs.vm_skipped != 'true'

    env:
      VM_IP: ${{ needs.job1_create_vm.outputs.public_ip }}

    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Configuration cle SSH (vockey)
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/vockey.pem
          chmod 600 ~/.ssh/vockey.pem
          ssh-keygen -l -f ~/.ssh/vockey.pem || {
            echo "Cle SSH invalide"
            exit 1
          }
          cat >> ~/.ssh/config << SSHCFG
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            IdentityFile ~/.ssh/vockey.pem
          SSHCFG

      - name: Copie du dossier BD
        run: |
          ssh -i ~/.ssh/vockey.pem \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ env.VM_IP }} "mkdir -p ~/BD"
          scp -i ~/.ssh/vockey.pem \
              -o StrictHostKeyChecking=no \
              -r BD/* \
              ubuntu@${{ env.VM_IP }}:~/BD/

      - name: Copie du script de demarrage
        run: |
          scp -i ~/.ssh/vockey.pem \
              -o StrictHostKeyChecking=no \
              scripts/03_start_app.sh \
              ubuntu@${{ env.VM_IP }}:~/03_start_app.sh

      - name: Lancement (restore DB + Spring Boot + Angular)
        timeout-minutes: 10
        run: |
          ssh -i ~/.ssh/vockey.pem \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ env.VM_IP }} \
              "chmod +x ~/03_start_app.sh && ~/03_start_app.sh"

      - name: Test connectivite Backend (port 8080)
        run: |
          echo "Test http://${{ env.VM_IP }}:8080 ..."
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s --max-time 5 -o /dev/null -w "%{http_code}" \
              http://${{ env.VM_IP }}:8080 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" != "000" ]; then
              echo "Backend repond sur le port 8080 (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Tentative $i/12 — 5s..."
            sleep 5
          done
          echo "Backend non accessible apres 60s"
          exit 1

      - name: Test connectivite Frontend Angular (port 4200)
        run: |
          echo "Test http://${{ env.VM_IP }}:4200 ..."
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s --max-time 5 -o /dev/null -w "%{http_code}" \
              http://${{ env.VM_IP }}:4200 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" != "000" ]; then
              echo "Frontend repond sur le port 4200 (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Tentative $i/12 — 5s..."
            sleep 5
          done
          echo "Frontend non accessible apres 60s"
          exit 1

# ════════════════════════════════════════════════════════════════════════════
#  JOB 4 — Monitoring CloudWatch
# ════════════════════════════════════════════════════════════════════════════
  job4_monitoring:
    name: "JOB 4 — Monitoring CloudWatch"
    runs-on: ubuntu-latest
    needs: [job1_create_vm, job3_start_app]
    if: |
      always() &&
      github.event.inputs.destroy_infra != 'true' &&
      needs.job1_create_vm.outputs.vm_skipped != 'true' &&
      needs.job3_start_app.result == 'success'

    env:
      VM_IP:       ${{ needs.job1_create_vm.outputs.public_ip }}
      INSTANCE_ID: ${{ needs.job1_create_vm.outputs.instance_id }}

    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Configuration credentials AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Configuration cle SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/vockey.pem
          chmod 600 ~/.ssh/vockey.pem
          cat >> ~/.ssh/config << SSHCFG
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            IdentityFile ~/.ssh/vockey.pem
          SSHCFG

      - name: Installation CloudWatch Agent sur la VM
        run: |
          ssh -i ~/.ssh/vockey.pem ubuntu@${{ env.VM_IP }} bash << 'SSHEOF'
            echo "Installation CloudWatch Agent..."
            wget -q https://s3.amazonaws.com/amazoncloudwatch-agent/ubuntu/amd64/latest/amazon-cloudwatch-agent.deb
            sudo dpkg -i amazon-cloudwatch-agent.deb
            rm -f amazon-cloudwatch-agent.deb
            echo "CloudWatch Agent installe"
          SSHEOF

      - name: Configuration CloudWatch (metriques + logs)
        run: |
          cat > /tmp/cloudwatch-config.json << 'CONFIG'
          {
            "agent": {
              "metrics_collection_interval": 60,
              "run_as_user": "root"
            },
            "metrics": {
              "namespace": "GMAO/EC2",
              "append_dimensions": {
                "InstanceId": "${aws:InstanceId}"
              },
              "metrics_collected": {
                "cpu": {
                  "measurement": ["cpu_usage_idle", "cpu_usage_user", "cpu_usage_system"],
                  "metrics_collection_interval": 60,
                  "totalcpu": true
                },
                "mem": {
                  "measurement": ["mem_used_percent", "mem_available"],
                  "metrics_collection_interval": 60
                },
                "disk": {
                  "measurement": ["used_percent", "free"],
                  "metrics_collection_interval": 60,
                  "resources": ["/"]
                }
              }
            },
            "logs": {
              "logs_collected": {
                "files": {
                  "collect_list": [
                    {
                      "file_path": "/home/ubuntu/backend.log",
                      "log_group_name": "/gmao/backend",
                      "log_stream_name": "{instance_id}",
                      "timezone": "UTC"
                    },
                    {
                      "file_path": "/home/ubuntu/frontend.log",
                      "log_group_name": "/gmao/frontend",
                      "log_stream_name": "{instance_id}",
                      "timezone": "UTC"
                    },
                    {
                      "file_path": "/var/log/syslog",
                      "log_group_name": "/gmao/system",
                      "log_stream_name": "{instance_id}",
                      "timezone": "UTC"
                    }
                  ]
                }
              }
            }
          }
          CONFIG

          scp -i ~/.ssh/vockey.pem \
              /tmp/cloudwatch-config.json \
              ubuntu@${{ env.VM_IP }}:/tmp/cloudwatch-config.json

          ssh -i ~/.ssh/vockey.pem ubuntu@${{ env.VM_IP }} bash << 'SSHEOF'
            sudo mkdir -p /opt/aws/amazon-cloudwatch-agent/etc
            sudo cp /tmp/cloudwatch-config.json \
              /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
            sudo /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
              -a fetch-config -m ec2 \
              -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json \
              -s
            sudo systemctl enable amazon-cloudwatch-agent
            echo "CloudWatch Agent demarre"
          SSHEOF

      - name: Creation topic SNS pour les alertes
        run: |
          TOPIC_ARN=$(aws sns create-topic \
            --name gmao-alerts \
            --query 'TopicArn' \
            --output text)
          echo "Topic SNS : $TOPIC_ARN"
          echo "TOPIC_ARN=$TOPIC_ARN" >> $GITHUB_ENV

          aws sns subscribe \
            --topic-arn "$TOPIC_ARN" \
            --protocol email \
            --notification-endpoint "oumaimabn.amelmm@gmail.com"
          echo "Abonnement email cree"

      - name: Creation des alarmes CloudWatch
        run: |
          INSTANCE_ID="${{ env.INSTANCE_ID }}"
          TOPIC_ARN="${{ env.TOPIC_ARN }}"

          aws cloudwatch put-metric-alarm \
            --alarm-name "gmao-cpu-high" \
            --alarm-description "CPU GMAO > 80%" \
            --metric-name CPUUtilization \
            --namespace AWS/EC2 \
            --statistic Average \
            --dimensions Name=InstanceId,Value=$INSTANCE_ID \
            --period 300 --evaluation-periods 1 \
            --threshold 80 \
            --comparison-operator GreaterThanThreshold \
            --alarm-actions "$TOPIC_ARN" \
            --ok-actions "$TOPIC_ARN"

          aws cloudwatch put-metric-alarm \
            --alarm-name "gmao-memory-high" \
            --alarm-description "Memoire GMAO > 85%" \
            --metric-name mem_used_percent \
            --namespace GMAO/EC2 \
            --statistic Average \
            --dimensions Name=InstanceId,Value=$INSTANCE_ID \
            --period 300 --evaluation-periods 1 \
            --threshold 85 \
            --comparison-operator GreaterThanThreshold \
            --alarm-actions "$TOPIC_ARN" \
            --ok-actions "$TOPIC_ARN"

          aws cloudwatch put-metric-alarm \
            --alarm-name "gmao-disk-full" \
            --alarm-description "Disque GMAO > 90%" \
            --metric-name disk_used_percent \
            --namespace GMAO/EC2 \
            --statistic Average \
            --dimensions Name=InstanceId,Value=$INSTANCE_ID \
            --period 300 --evaluation-periods 1 \
            --threshold 90 \
            --comparison-operator GreaterThanThreshold \
            --alarm-actions "$TOPIC_ARN" \
            --ok-actions "$TOPIC_ARN"

          echo "Alarmes CloudWatch creees"
          aws cloudwatch describe-alarms \
            --alarm-name-prefix "gmao-" \
            --query 'MetricAlarms[].{Nom:AlarmName,Etat:StateValue}' \
            --output table

      - name: Creation dashboard CloudWatch
        run: |
          INSTANCE_ID="${{ env.INSTANCE_ID }}"
          REGION="${{ env.AWS_REGION }}"

          cat > /tmp/dashboard.json << DASH
          {
            "widgets": [
              {
                "type": "metric",
                "x": 0, "y": 0, "width": 12, "height": 6,
                "properties": {
                  "title": "CPU Utilization (%)",
                  "metrics": [["AWS/EC2","CPUUtilization","InstanceId","$INSTANCE_ID"]],
                  "period": 60, "stat": "Average", "region": "$REGION",
                  "view": "timeSeries"
                }
              },
              {
                "type": "metric",
                "x": 12, "y": 0, "width": 12, "height": 6,
                "properties": {
                  "title": "Memoire utilisee (%)",
                  "metrics": [["GMAO/EC2","mem_used_percent","InstanceId","$INSTANCE_ID"]],
                  "period": 60, "stat": "Average", "region": "$REGION",
                  "view": "timeSeries"
                }
              },
              {
                "type": "metric",
                "x": 0, "y": 6, "width": 12, "height": 6,
                "properties": {
                  "title": "Disque utilise (%)",
                  "metrics": [["GMAO/EC2","disk_used_percent","InstanceId","$INSTANCE_ID"]],
                  "period": 300, "stat": "Average", "region": "$REGION",
                  "view": "timeSeries"
                }
              },
              {
                "type": "metric",
                "x": 12, "y": 6, "width": 12, "height": 6,
                "properties": {
                  "title": "Trafic reseau (bytes)",
                  "metrics": [
                    ["AWS/EC2","NetworkIn","InstanceId","$INSTANCE_ID"],
                    ["AWS/EC2","NetworkOut","InstanceId","$INSTANCE_ID"]
                  ],
                  "period": 60, "stat": "Sum", "region": "$REGION",
                  "view": "timeSeries"
                }
              },
              {
                "type": "log",
                "x": 0, "y": 12, "width": 24, "height": 6,
                "properties": {
                  "title": "Logs Backend Spring Boot",
                  "query": "SOURCE '/gmao/backend' | fields @timestamp, @message | sort @timestamp desc | limit 20",
                  "region": "$REGION",
                  "view": "table"
                }
              }
            ]
          }
          DASH

          aws cloudwatch put-dashboard \
            --dashboard-name "GMAO-Dashboard" \
            --dashboard-body file:///tmp/dashboard.json
          echo "Dashboard CloudWatch cree"

      - name: Rapport periodique metriques via SNS
        run: |
          INSTANCE_ID="${{ env.INSTANCE_ID }}"
          REGION="${{ env.AWS_REGION }}"
          TOPIC_ARN=$(aws sns list-topics \
            --query "Topics[?ends_with(TopicArn,'gmao-alerts')].TopicArn" \
            --output text)

          START=$(date -u -d '5 minutes ago' '+%Y-%m-%dT%H:%M:%SZ')
          END=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

          CPU=$(aws cloudwatch get-metric-statistics \
            --namespace AWS/EC2 --metric-name CPUUtilization \
            --dimensions Name=InstanceId,Value=$INSTANCE_ID \
            --start-time $START --end-time $END \
            --period 300 --statistics Average \
            --query 'Datapoints[0].Average' --output text 2>/dev/null || echo "N/A")

          MEM=$(aws cloudwatch get-metric-statistics \
            --namespace GMAO/EC2 --metric-name mem_used_percent \
            --dimensions Name=InstanceId,Value=$INSTANCE_ID \
            --start-time $START --end-time $END \
            --period 300 --statistics Average \
            --query 'Datapoints[0].Average' --output text 2>/dev/null || echo "N/A")

          DISK=$(aws cloudwatch get-metric-statistics \
            --namespace GMAO/EC2 --metric-name disk_used_percent \
            --dimensions Name=InstanceId,Value=$INSTANCE_ID \
            --start-time $START --end-time $END \
            --period 300 --statistics Average \
            --query 'Datapoints[0].Average' --output text 2>/dev/null || echo "N/A")

          BACKEND_STATUS=$(curl -s --max-time 5 -o /dev/null -w "%{http_code}" \
            http://${{ env.VM_IP }}:8080 2>/dev/null || echo "DOWN")
          FRONTEND_STATUS=$(curl -s --max-time 5 -o /dev/null -w "%{http_code}" \
            http://${{ env.VM_IP }}:4200 2>/dev/null || echo "DOWN")

          if [ -n "$TOPIC_ARN" ]; then
            MSG="RAPPORT MONITORING GMAO | Date: $(date '+%d/%m/%Y %H:%M:%S') | Instance: $INSTANCE_ID | CPU: ${CPU}% | Memoire: ${MEM}% | Disque: ${DISK}% | Backend HTTP: $BACKEND_STATUS | Frontend HTTP: $FRONTEND_STATUS | Backend: http://$VM_IP:8080 | Frontend: http://$VM_IP:4200 | Dashboard: https://console.aws.amazon.com/cloudwatch/home#dashboards:name=GMAO-Dashboard"
            aws sns publish \
              --topic-arn "$TOPIC_ARN" \
              --subject "[GMAO] Rapport Monitoring $(date '+%d/%m/%Y %H:%M')" \
              --message "$MSG"
            echo "Rapport envoye via SNS"
          else
            echo "Topic SNS introuvable"
          fi

      - name: Resume monitoring
        run: |
          echo "MONITORING CLOUDWATCH CONFIGURE"
          echo "Metriques : CPU, Memoire, Disque (toutes les 60s)"
          echo "Logs      : /gmao/backend, /gmao/frontend, /gmao/system"
          echo "Alarmes   : gmao-cpu-high, gmao-memory-high, gmao-disk-full"
          echo "Email     : oumaimabn.amelmm@gmail.com"
          echo "Dashboard : https://console.aws.amazon.com/cloudwatch/home#dashboards:name=GMAO-Dashboard"

# ════════════════════════════════════════════════════════════════════════════
#  JOB FINAL — Notification (toujours execute)
# ════════════════════════════════════════════════════════════════════════════
  job_notify:
    name: "JOB FINAL — Notification et Resume"
    runs-on: ubuntu-latest
    needs: [job1_create_vm, job2_post_install, job3_start_app, job4_monitoring]
    if: always() && github.event.inputs.destroy_infra != 'true'

    env:
      VM_IP:      ${{ needs.job1_create_vm.outputs.public_ip }}
      VM_SKIPPED: ${{ needs.job1_create_vm.outputs.vm_skipped }}
      J0_STATUS:  ${{ needs.job0_validate_code.result }}
      J1_STATUS:  ${{ needs.job1_create_vm.result }}
      J2_STATUS:  ${{ needs.job2_post_install.result }}
      J3_STATUS:  ${{ needs.job3_start_app.result }}
      JM_STATUS:  ${{ needs.job4_monitoring.result }}

    steps:
      - name: Resume complet du deploiement (logs)
        run: |
          echo "RAPPORT DE DEPLOIEMENT GMAO"
          echo "Date          : $(date '+%d/%m/%Y %H:%M:%S')"
          echo "Branche       : ${{ github.ref_name }}"
          echo "Commit        : ${{ github.sha }}"
          echo "Declenche par : ${{ github.actor }}"
          echo "---"
          echo "JOB 0 — Validation code : ${{ needs.job0_validate_code.result }}"
          echo "JOB 1 — VM EC2          : ${{ needs.job1_create_vm.result }}"
          if [ "$VM_SKIPPED" = "true" ]; then
            echo "JOB 2 — Post-install    : skippe (VM deja active)"
            echo "JOB 3 — Demarrage app   : skippe (VM deja active)"
            echo "JOB 4 — Monitoring      : skippe (VM deja active)"
          else
            echo "JOB 2 — Post-install    : ${{ needs.job2_post_install.result }}"
            echo "JOB 3 — Demarrage app   : ${{ needs.job3_start_app.result }}"
            echo "JOB 4 — Monitoring      : ${{ needs.job4_monitoring.result }}"
          fi
          echo "---"
          if [ "$VM_SKIPPED" = "true" ]; then
            echo "VM DEJA ACTIVE — aucun deploiement effectue"
          elif [ "$J1_STATUS" = "success" ] && [ "$J3_STATUS" = "success" ]; then
            echo "DEPLOIEMENT REUSSI"
            echo "Backend  : http://$VM_IP:8080"
            echo "Frontend : http://$VM_IP:4200"
            echo "SSH      : ssh -i labsuser.pem ubuntu@$VM_IP"
            echo "Dashboard: CloudWatch → GMAO-Dashboard"
          elif [ "$J1_STATUS" = "failure" ]; then
            echo "ECHEC — Creation VM echouee"
          elif [ "$J2_STATUS" = "failure" ]; then
            echo "ECHEC — Post-install echoue"
          elif [ "$J3_STATUS" = "failure" ]; then
            echo "ECHEC — Demarrage application echoue"
          fi
          echo "Logs : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Envoi email resultat pipeline via Gmail SMTP
        run: |
          if [ "${{ needs.job1_create_vm.outputs.vm_skipped }}" = "true" ]; then
            STATUT="VM DEJA ACTIVE — aucun deploiement effectue"
            SUJET="[GMAO] VM deja active — $(date '+%d/%m/%Y %H:%M')"
          elif [ "${{ needs.job1_create_vm.result }}" = "success" ] && \
               [ "${{ needs.job3_start_app.result }}" = "success" ]; then
            STATUT="DEPLOIEMENT REUSSI"
            SUJET="[GMAO] Deploiement reussi — ${{ github.ref_name }}"
          else
            STATUT="DEPLOIEMENT ECHOUE"
            SUJET="[GMAO] Deploiement echoue — ${{ github.ref_name }}"
          fi

          BODY="Bonjour, RAPPORT DEPLOIEMENT GMAO - Date: $(date '+%d/%m/%Y %H:%M:%S') - Statut: $STATUT - Branche: $GITHUB_REF_NAME - Commit: $GITHUB_SHA - Auteur: $GITHUB_ACTOR - JOB0: $J0_STATUS - JOB1: $J1_STATUS - JOB2: $J2_STATUS - JOB3: $J3_STATUS - JOB4: $JM_STATUS - Backend: http://$VM_IP:8080 - Frontend: http://$VM_IP:4200 - SSH: ubuntu@$VM_IP - Dashboard: https://console.aws.amazon.com/cloudwatch/home#dashboards:name=GMAO-Dashboard - Logs: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

          sudo apt-get install -y msmtp msmtp-mta -q

          {
            echo "defaults"
            echo "auth on"
            echo "tls on"
            echo "tls_trust_file /etc/ssl/certs/ca-certificates.crt"
            echo "logfile ~/.msmtp.log"
            echo ""
            echo "account gmail"
            echo "host smtp.gmail.com"
            echo "port 587"
            echo "from ${{ secrets.GMAIL_USER }}"
            echo "user ${{ secrets.GMAIL_USER }}"
            echo "password ${{ secrets.GMAIL_PASSWORD }}"
            echo ""
            echo "account default : gmail"
          } > ~/.msmtprc
          chmod 600 ~/.msmtprc

          printf "To: oumaimabn.amelmm@gmail.com\nFrom: %s\nSubject: %s\nContent-Type: text/plain; charset=UTF-8\n\n%s" \
            "${{ secrets.GMAIL_USER }}" "$SUJET" "$BODY" | \
            msmtp "oumaimabn.amelmm@gmail.com" && \
            echo "Email envoye a oumaimabn.amelmm@gmail.com" || \
            echo "Echec envoi email — verifiez GMAIL_USER et GMAIL_PASSWORD"

